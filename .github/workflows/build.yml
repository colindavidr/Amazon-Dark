name: Build AmazonDark (rootless .deb)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install ldid dpkg make

      - name: Set up Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"

      - name: Fetch rootless SDK (iOS 16.5)
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          mkdir -p "$THEOS/sdks"
          cd "$THEOS/sdks"
          # Theos community SDKs (matches the arm64e / rootless target used for NathanLR).
          curl -L https://github.com/theos/sdks/archive/refs/heads/master.zip -o sdks.zip
          unzip -q sdks.zip
          cp -r sdks-master/iPhoneOS16.5.sdk "$THEOS/sdks/" || \
          cp -r sdks-master/*.sdk "$THEOS/sdks/"
          ls "$THEOS/sdks"

      - name: Build (rootless package)
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          echo "---- built packages ----"
          ls -l packages/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmazonDark-rootless-deb
          path: packages/*.deb
          if-no-files-found: error

      - name: Attach .deb to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
